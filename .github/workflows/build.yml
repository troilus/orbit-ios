name: Quick TrollStore Build

on:
  workflow_dispatch:
    inputs:
      clean:
        description: 'Clean build'
        required: false
        default: false
        type: boolean

jobs:
  quick-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Pods
        run: |
          gem install cocoapods
          pod install
      
      - name: Quick Build (No Signing)
        run: |
          xcodebuild build -workspace ORBIT.xcworkspace \
            -scheme ORBIT \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Find and Package .app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r ORBIT-TrollStore.zip Payload/
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ORBIT-TrollStore
          path: "*.zip"